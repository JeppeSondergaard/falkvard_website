services:
  afalkvard-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./data:/app/data
      - ./next.config.ts:/app/next.config.ts
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
